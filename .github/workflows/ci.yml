name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  UV_CACHE_DIR: .uv-cache

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.13"

      - name: Install locked development environment
        run: uv sync --locked --extra dev --python "${{ matrix.python-version }}"

      - name: Build native extension
        run: .venv/bin/python -m maturin develop --release --locked

      - name: Run Python checks
        run: |
          .venv/bin/python -m ruff check .
          .venv/bin/python -m pytest -m "not stable_retro"

  rust:
    name: Rust
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check formatting
        run: cargo fmt --check

      - name: Check lints
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --lib

  optional-extras:
    name: Optional player and trainer extras
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.13"

      - name: Install optional extras
        run: uv sync --locked --extra dev --extra play --extra train

      - name: Build native extension
        run: .venv/bin/python -m maturin develop --release --locked

      - name: Smoke optional imports and commands
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          .venv/bin/python -c "import pygame, torch; print(pygame.version.ver, torch.__version__)"
          .venv/bin/python train.py ppo --help
          .venv/bin/python -m breakout_turbo_env.play --help

  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-15
          - platform: linux
            runner: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.13"

      - name: Install locked build environment
        run: uv sync --locked --extra dev

      - name: Build supported wheel
        run: |
          .venv/bin/python .codex/skills/build-release/scripts/release_build.py \
            build-platform --platform "${{ matrix.platform }}"

      - name: Audit and smoke wheel
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(wheelhouse-v*-${{ matrix.platform }}/*.whl)
          if (( ${#wheels[@]} != 1 )); then
            printf 'expected one wheel, found %s\n' "${#wheels[@]}" >&2
            exit 1
          fi
          .venv/bin/python .codex/skills/build-release/scripts/release_build.py \
            audit-wheels "${wheels[0]}"
          .venv/bin/python .codex/skills/build-release/scripts/release_build.py \
            smoke-wheel "${wheels[0]}"
