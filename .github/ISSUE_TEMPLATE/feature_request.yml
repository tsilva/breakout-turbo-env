name: Feature request
description: Propose a scoped improvement to the public project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or research problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: The proposal does not require distributing ROMs or extracted game assets.
          required: true
        - label: I understand only Apple-silicon macOS and x86-64 Linux are supported.
          required: true
